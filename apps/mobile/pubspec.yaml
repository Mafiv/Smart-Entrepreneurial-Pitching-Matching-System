# Mobile app for SEPMS - core mobile package
name: sepms_mobile
description: SEPMS Mobile Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^9.2.1
  
  # Functional Programming
  dartz: ^0.10.1

  # Networking
  dio: ^5.4.0
  socket_io_client: ^3.1.4

  # Authentication
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Storage
  shared_preferences: ^2.2.2

  # File handling
  image_picker: ^1.0.5
  file_picker: ^11.0.2

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2


  # Voice
  flutter_tts: ^4.2.5

  # Utilities
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  flutter_dotenv: ^6.0.1
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
